name: Playwright Enterprise Agents IA

on:
  push:
    branches:
      - master

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create .env file
        run: echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env

      - name: Generate tests from recordings
        run: npm run generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate BDD features
        run: npm run bdd
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run Playwright tests (combined report)
        id: playwright
        run: |
          npx playwright test GenerateTest/tests --reporter=html --output=reports/combined || true
          # El '|| true' evita que el pipeline se detenga aquí (pero capturamos el código de salida después)
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload combined HTML report (zipped for easy download)
        if: always()
        run: |
          cd reports/combined
          zip -r ../../playwright-report.zip .
          cd ../..
        working-directory: ${{ github.workspace }}

      - name: Upload zipped HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report.zip
          retention-days: 7

      - name: Upload test results (traces, videos, screenshots) - only if non-empty
        if: always()
        run: |
          if [ -d "test-results" ] && [ "$(ls -A test-results)" ]; then
            echo "TEST_RESULTS_EXISTS=true" >> $GITHUB_ENV
          else
            echo "TEST_RESULTS_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Upload test results artifact
        if: env.TEST_RESULTS_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 7

      - name: Fail the job if Playwright tests failed
        if: steps.playwright.outputs.exit_code != '0'
        run: exit 1